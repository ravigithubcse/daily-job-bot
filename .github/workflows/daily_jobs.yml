name: Daily IT Job Digest — Roy

on:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST = 2:30 AM UTC — ONE trigger only
  workflow_dispatch:         # Manual trigger

permissions:
  contents: write   # needed so the bot can commit the updated seen_jobs.json tracker back

jobs:
  run-job-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check secrets
        env:
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          echo "GMAIL_SENDER set: $([ -n "$GMAIL_SENDER" ] && echo YES || echo NO)"
          echo "GMAIL_APP_PASSWORD set: $([ -n "$GMAIL_APP_PASSWORD" ] && echo YES || echo NO)"

      - name: Run Job Bot Pipeline
        env:
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          echo "🤖 Roy Job Bot — $(date '+%A %d %B %Y %H:%M UTC')"
          python scripts/run_all.py

      - name: Commit updated job tracker
        run: |
          git config user.name "roy-job-bot"
          git config user.email "actions@github.com"
          git add data/seen_jobs.json
          if git diff --cached --quiet; then
            echo "No tracker changes to commit."
          else
            git commit -m "chore: update seen_jobs tracker [skip ci]"
            git push
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_number }}
          path: |
            email_preview.html
            jobs_found.json
          retention-days: 7
