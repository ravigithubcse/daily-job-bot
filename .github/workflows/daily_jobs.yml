name: "Roy's Daily Job Bot 🤖"

on:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST = 2:30 AM UTC every day
  workflow_dispatch:

jobs:
  daily-job-digest:
    name: Scrape → Filter → Tailor → Email
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run Job Bot (Scrape → Filter → Tailor → Email)
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/run_all.py

      - name: 📊 Upload email preview
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: email-preview-run-${{ github.run_number }}
          path: email_preview.html
          retention-days: 7

      - name: 📋 Upload jobs data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-data-run-${{ github.run_number }}
          path: jobs_found.json
          retention-days: 7
