name: Daily IT Job Digest — Roy

on:
  schedule:
    - cron: '30 1 * * *'   # PRIMARY   — 7:00 AM IST nominal (GitHub fires ~8-9 AM IST with delay)
    - cron: '30 2 * * *'   # SECONDARY — 8:00 AM IST nominal (backup, used once PRIMARY synced)
  workflow_dispatch:         # Manual trigger anytime

jobs:
  run-job-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Gmail secrets
        env:
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          echo "=== GMAIL SECRET VALIDATION ==="
          if [ -z "$GMAIL_SENDER" ]; then
            echo "❌ GMAIL_SENDER is NOT SET"
          else
            echo "✅ GMAIL_SENDER = $GMAIL_SENDER"
          fi
          if [ -z "$GMAIL_APP_PASSWORD" ]; then
            echo "❌ GMAIL_APP_PASSWORD is NOT SET — email will fail"
          else
            LEN=${#GMAIL_APP_PASSWORD}
            echo "✅ GMAIL_APP_PASSWORD is SET ($LEN chars)"
            if [ "$LEN" -ne 16 ]; then
              echo "⚠  WARNING: Gmail App Passwords must be exactly 16 chars — got $LEN"
            fi
          fi

      - name: Run Job Bot Pipeline
        env:
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🤖 Roy Job Bot v3.0"
          echo "📅 $(date '+%A %d %B %Y — %H:%M UTC')"
          echo "🎯 ATS-matched IT jobs | Bengaluru only | 0-2 YOE | 13 platforms"
          python scripts/run_all.py

      - name: Upload email preview
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: email-preview-${{ github.run_number }}
          path: email_preview.html
          retention-days: 7

      - name: Upload jobs JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-found-${{ github.run_number }}
          path: jobs_found.json
          retention-days: 3
